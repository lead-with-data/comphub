            <form id="compound-form">
                <div class="grid-2">
                    <div class="input-group">

                        <input type="number" id="principal" value="10000" min="0" required>

                <div class="grid-2">
                    <div class="input-group">
                        <label>Time Period (Years)</label>
                        <input type="number" id="years" value="10" min="1" required>
                    </div>
                    <div class="input-group">
                        <label>Compounding Frequency</label>
                        <select id="frequency">
                            <option value="1">Annually (1x / yr)</option>
                            <option value="2">Semi-Annually (2x / yr)</option>
                            <option value="4">Quarterly (4x / yr)</option>
                            <option value="12" selected>Monthly (12x / yr)</option>
                            <option value="365">Daily (365x / yr)</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label>Additional Monthly Deposit ($) [Optional]</label>
                    <input type="number" id="monthly-deposit" value="0" min="0">
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px; background: var(--brand-primary); color: white; border: none; padding: 16px; border-radius: var(--radius); font-weight: 600; cursor: pointer;">Calculate

                <div class="result-value" id="future-value">$0.00</div>

                        Total Principal
                        <span class="breakdown-val" id="total-principal">$0</span>
                    </div>

                        <span class="breakdown-val" id="total-interest">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('compound-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Formula: A = P(1 + r/n)^(nt)
            const p = parseFloat(document.getElementById('principal').value) || 0;
            const r = parseFloat(document.getElementById('rate').value) / 100 || 0;
            const t = parseInt(document.getElementById('years').value) || 0;
            const n = parseInt(document.getElementById('frequency').value) || 12;
            const pmt = parseFloat(document.getElementById('monthly-deposit').value) || 0;

            // Compute Base Principal Compounding
            const baseCompounded = p * Math.pow(1 + (r / n), n * t);

            // Compute Additional Monthly Deposits Compounding
            let depositCompounded = 0;
            if (pmt > 0) {
                // If frequency differs from monthly deposits, we approximate using the continuous formula or map the PMT formula.
                // Standard PMT Future Value formula (assuming deposits match compounding frequency, here we force monthly for the PMT portion for simplicity if user selects arbitrary compounding, but strictly speaking FV = PMT * [((1 + r/n)^(nt) - 1) / (r/n)])

                // For simplicity assuming monthly deposits earn the annual rate divided by 12, regardless of base n.
                const rMonthly = r / 12;
                const totalMonths = t * 12;
                if (r === 0) {
                    depositCompounded = pmt * totalMonths;
                } else {
                    depositCompounded = pmt * ((Math.pow(1 + rMonthly, totalMonths) - 1) / rMonthly);
                }
            }

            const futureValue = baseCompounded + depositCompounded;
            const totalPrincipal = p + (pmt * t * 12);
            const totalInterest = futureValue - totalPrincipal;
            const mult = (futureValue / totalPrincipal).toFixed(1);

            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 2
            });

            document.getElementById('future-value').textContent = formatter.format(futureValue);
            document.getElementById('total-principal').textContent = formatter.format(totalPrincipal);
            document.getElementById('total-interest').textContent = formatter.format(totalInterest);
            document.getElementById('multiplier').textContent = mult + "x Growth";

            document.getElementById('result-box').style.display = 'block';
        });
    </script>
