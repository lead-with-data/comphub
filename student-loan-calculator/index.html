    <header class="site-header">
        <div class="container header-content">
            <a href="../index.html" class="logo">

    <main class="container calc-container">
        <div class="card">
            <div class="widget-header" style="margin-bottom: 30px;">
                <span class="widget-tag">Education</span>
            </div>
            <h1 style="margin-bottom: 10px;">Student Loan Calculator</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Calculate your monthly student loan payments
                and total accrued interest over the life of the loan.</p>

            <form id="loan-form">
                <div class="input-group">
                    <label for="loan-amount">Total Loan Amount ($)</label>
                    <input type="number" id="loan-amount" value="35000" min="0" step="100">
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="interest-rate">Annual Interest Rate (%)</label>
                        <input type="number" id="interest-rate" value="5.8" min="0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="loan-term">Loan Term (Years)</label>
                        <input type="number" id="loan-term" value="10" min="1" step="1">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px; background: var(--brand-primary); color: white; border: none; padding: 16px; border-radius: var(--radius); font-weight: 600; cursor: pointer;">Calculate
                    Monthly Payment</button>
            </form>

            <div class="result-box" id="result-box" style="display: none;">
                <div class="result-label">Estimated Monthly Payment</div>
                <div class="result-value" id="monthly-payment">$0.00</div>

                <div class="breakdown">
                    <div>
                        Total Interest Paid
                        <span class="breakdown-val" id="total-interest">$0</span>
                    </div>
                    <div>
                        Total Cost of Loan
                        <span class="breakdown-val" id="total-cost">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loan-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Formula: PMT = P × [r(1+r)^n]/[(1+r)^n-1]
            // P = Principal loan amount
            // r = Monthly interest rate (annual rate / 12)
            // n = Number of months

            const principal = parseFloat(document.getElementById('loan-amount').value) || 0;
            const annualRate = parseFloat(document.getElementById('interest-rate').value) || 0;
            const years = parseInt(document.getElementById('loan-term').value) || 10;

            const monthlyRate = (annualRate / 100) / 12;
            const numberOfPayments = years * 12;

            let monthlyPayment = 0;

            if (monthlyRate === 0) {
                monthlyPayment = principal / numberOfPayments;
            } else {
                monthlyPayment = principal *
                    (monthlyRate * Math.pow(1 + monthlyRate, numberOfPayments)) /
                    (Math.pow(1 + monthlyRate, numberOfPayments) - 1);
            }

            const totalAmountPaid = monthlyPayment * numberOfPayments;
            const totalInterest = totalAmountPaid - principal;

            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 2
            });
            const compactFormatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            });

            document.getElementById('monthly-payment').textContent = formatter.format(monthlyPayment);
            document.getElementById('total-interest').textContent = compactFormatter.format(totalInterest);
            document.getElementById('total-cost').textContent = compactFormatter.format(totalAmountPaid);

            document.getElementById('result-box').style.display = 'block';
        });
    </script>
