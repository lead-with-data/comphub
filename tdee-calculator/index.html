    <script>
        document.getElementById('tdee-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Mifflin-St Jeor Equation
            // Male: (10 × weight in kg) + (6.25 × height in cm) - (5 × age in years) + 5
            // Female: (10 × weight in kg) + (6.25 × height in cm) - (5 × age in years) - 161

            const gender = document.getElementById('gender').value;
            const age = parseInt(document.getElementById('age').value);
            const weightLbs = parseFloat(document.getElementById('weight').value);
            const heightInches = parseFloat(document.getElementById('height').value);
            const activity = parseFloat(document.getElementById('activity').value);
            const goalMod = parseInt(document.getElementById('goal').value);

            // Conversions
            const weightKg = weightLbs * 0.453592;
            const heightCm = heightInches * 2.54;

            let bmr = 0;
            if (gender === 'male') {
                bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) + 5;
            } else {
                bmr = (10 * weightKg) + (6.25 * heightCm) - (5 * age) - 161;
            }

            const tdee = bmr * activity;
            const targetCalories = Math.round(tdee + goalMod);

            // Macros based on standard 30/30/40 split
            const proteinCals = targetCalories * 0.30;
            const fatCals = targetCalories * 0.30;
            const carbCals = targetCalories * 0.40;

            const proteinGrams = Math.round(proteinCals / 4);
            const fatGrams = Math.round(fatCals / 9);
            const carbGrams = Math.round(carbCals / 4);

            document.getElementById('bmr').textContent = Math.round(bmr).toLocaleString();
            document.getElementById('target-cals').textContent = targetCalories.toLocaleString();

            document.getElementById('macro-pro').textContent = proteinGrams + "g";
            document.getElementById('macro-fat').textContent = fatGrams + "g";
            document.getElementById('macro-carb').textContent = carbGrams + "g";

            document.getElementById('result-box').style.display = 'block';
        });
    </script>
