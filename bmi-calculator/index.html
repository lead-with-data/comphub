<body>
    <header class="site-header">
        <div class="container header-content">
            <a href="../index.html" class="logo">
                Back to Dashboard
            </a>
        </div>
    </header>

    <main class="container calc-container">
        <div class="card">
            <div class="widget-header" style="margin-bottom: 30px;">
                <span class="widget-tag">Health</span>
            </div>
            <h1 style="margin-bottom: 10px;">BMI Calculator</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Calculate your Body Mass Index to determine
                your general weight category.</p>

            <form id="bmi-form">
                <div class="input-group">
                    <label>Height</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="feet" value="5" min="0" placeholder="Feet" required>
                        <input type="number" id="inches" value="9" min="0" max="11" placeholder="Inches" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="weight">Weight (Lbs)</label>
                    <input type="number" id="weight" value="160" min="0" required>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px; background: var(--brand-primary); color: white; border: none; padding: 16px; border-radius: var(--radius); font-weight: 600; cursor: pointer;">Calculate
                    BMI</button>
            </form>

            <div class="result-box" id="result-box" style="display: none;">
                <div class="result-label" id="bmi-category">Normal Weight</div>
                <div class="result-value" id="bmi-value">0.0</div>

                <div class="scale">
                    <div class="s-under" title="Underweight"></div>
                    <div class="s-normal" title="Normal"></div>
                    <div class="s-over" title="Overweight"></div>
                    <div class="s-obese" title="Obese"></div>
                </div>

                <div class="breakdown">
                    Healthy BMI range: <strong>18.5 kg/m² - 25 kg/m²</strong>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('bmi-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Formula: 703 * weight (lbs) / [height (in)]^2
            const feet = parseInt(document.getElementById('feet').value) || 0;
            const inches = parseInt(document.getElementById('inches').value) || 0;
            const weight = parseFloat(document.getElementById('weight').value) || 0;

            const heightInches = (feet * 12) + inches;

            if (heightInches <= 0 || weight <= 0) {
                alert("Please enter valid height and weight.");
                return;
            }

            const bmi = (weight / (heightInches * heightInches)) * 703;

            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Underweight";
                color = "#60a5fa"; // Blue
            } else if (bmi >= 18.5 && bmi < 25) {
                category = "Normal Weight";
                color = "#10b981"; // Green
            } else if (bmi >= 25 && bmi < 30) {
                category = "Overweight";
                color = "#f59e0b"; // Yellow/Orange
            } else {
                category = "Obese";
                color = "#ef4444"; // Red
            }

            document.getElementById('bmi-value').textContent = bmi.toFixed(1);
            document.getElementById('bmi-value').style.color = color;
            document.getElementById('bmi-category').textContent = category;

            document.getElementById('result-box').style.display = 'block';
        });
    </script>
