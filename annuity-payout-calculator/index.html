        .result-box {

        .result-value {

        .result-label {

        }

        .grid-2 {

        }

        .breakdown-val {

            color: var(--text-primary);

<body>
    <header class="site-header">
        <div class="container header-content">
            <a href="../index.html" class="logo">
                Back to Dashboard
            </a>
        </div>
    </header>

    <main class="container calc-container">
        <div class="card">
            <div class="widget-header" style="margin-bottom: 30px;">
                <span class="widget-tag">Retirement</span>
            </div>
            <h1 style="margin-bottom: 10px;">Annuity Payout Calculator</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px;">Calculate the fixed monthly payout you will
                receive from a lump sum annuity investment.</p>

            <form id="annuity-form">
                <div class="input-group">
                    <label for="principal">Initial Lump Sum (Principal $)</label>
                    <input type="number" id="principal" value="500000" min="0" step="1000">
                </div>

                <div class="grid-2">
                    <div class="input-group">
                        <label for="interest-rate">Expected Annual Return (%)</label>
                        <input type="number" id="interest-rate" value="5.0" min="0" step="0.1">
                    </div>
                    <div class="input-group">
                        <label for="years">Payout Duration (Years)</label>
                        <input type="number" id="years" value="20" min="1" step="1">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 10px; background: var(--brand-primary); color: white; border: none; padding: 16px; border-radius: var(--radius); font-weight: 600; cursor: pointer;">Calculate
                    Payout</button>
            </form>

            <div class="result-box" id="result-box" style="display: none;">
                <div class="result-label">Fixed Monthly Payout</div>
                <div class="result-value" id="monthly-payout">$0.00</div>

                <div class="breakdown">
                    <div>
                        Total Expected Return
                        <span class="breakdown-val" id="total-return">$0</span>
                    </div>
                    <div>
                        Total Interest Earned
                        <span class="breakdown-val" id="total-interest">$0</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('annuity-form').addEventListener('submit', function (e) {
            e.preventDefault();

            // Formula: PMT = P * [r / (1 - (1+r)^-n)]
            const principal = parseFloat(document.getElementById('principal').value) || 0;
            const annualRate = parseFloat(document.getElementById('interest-rate').value) || 0;
            const years = parseInt(document.getElementById('years').value) || 20;

            const monthlyRate = (annualRate / 100) / 12;
            const numberOfPayments = years * 12;

            let monthlyPayout = 0;

            if (monthlyRate === 0) {
                monthlyPayout = principal / numberOfPayments;
            } else {
                monthlyPayout = principal * (monthlyRate / (1 - Math.pow(1 + monthlyRate, -numberOfPayments)));
            }

            const totalReturn = monthlyPayout * numberOfPayments;
            const totalInterest = totalReturn - principal;

            const formatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 2
            });
            const compactFormatter = new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                maximumFractionDigits: 0
            });

            document.getElementById('monthly-payout').textContent = formatter.format(monthlyPayout);
            document.getElementById('total-return').textContent = compactFormatter.format(totalReturn);
            document.getElementById('total-interest').textContent = compactFormatter.format(totalInterest);

            document.getElementById('result-box').style.display = 'block';
        });
    </script>
</body>
